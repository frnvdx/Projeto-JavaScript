<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Calculadora de IMC desenvolvida com HTML, CSS e JavaScript. Projeto de portfólio Front-end.">
    <title>Calculadora de IMC|Portfólio Front-end</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">

        <h1>Calculadora de IMC</h1>

        <p>
            Descubra seu Índice de Massa Corporal de forma rápida.
        </p>

        <form id="imc-form">
            <label for="peso">Peso (kg)</label>
            <input type="number" id="peso" name="peso" placeholder="Ex: 65"
             step="0.1" min="1"autocomplete="off" required >

            <label for="altura">Altura (m)</label>

            <input type="number" id="altura" name="altura" placeholder="Ex: 1.70"
             step="0.01" min="0.5" autocomplete="off" required >

            <button type="submit"> Calcular IMC </button>

        </form>

        <section id="resultado" aria-live="polite"> </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
